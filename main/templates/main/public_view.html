<!-- main/templates/main/public_view.html -->
<h2>All Posts</h2>
{% for post in posts %}
    <h3>{{ post.title }}</h3>
    <p>{{ post.description }}</p>
    {% if post.image %}
        <img src="{{ post.image.url }}" width="300" />
    {% endif %}
    {% if post.video %}
        <video width="320" controls>
            <source src="{{ post.video.url }}" type="video/mp4">
        </video>
    {% endif %}
{% endfor %}
